<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="#1A1918" stroke="none"/>

  <!-- Open book shape -->
  <g transform="translate(60, 62)">
    <!-- Left page -->
    <path d="M-4,-20 Q-4,-22 -6,-22 L-28,-22 Q-30,-22 -30,-20 L-30,14 Q-30,16 -28,16 L-6,16 Q-4,16 -4,14 Z"
          fill="#FAFAF8" opacity="0.95"/>
    <!-- Right page -->
    <path d="M4,-20 Q4,-22 6,-22 L28,-22 Q30,-22 30,-20 L30,14 Q30,16 28,16 L6,16 Q4,16 4,14 Z"
          fill="#FAFAF8" opacity="0.85"/>

    <!-- Spine -->
    <line x1="0" y1="-24" x2="0" y2="18" stroke="#1A1918" stroke-width="1.5" opacity="0.3"/>

    <!-- Text lines on left page -->
    <line x1="-24" y1="-14" x2="-10" y2="-14" stroke="#C4C0BC" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-24" y1="-8" x2="-12" y2="-8" stroke="#C4C0BC" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-24" y1="-2" x2="-14" y2="-2" stroke="#C4C0BC" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-24" y1="4" x2="-11" y2="4" stroke="#C4C0BC" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-24" y1="10" x2="-16" y2="10" stroke="#C4C0BC" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Highlight annotation on left page (the "gloss") -->
    <rect x="-25" y="-16" width="18" height="7" rx="2" fill="#FF5021" opacity="0.25"/>

    <!-- Annotation mark / pencil stroke on right page -->
    <line x1="8" y1="-14" x2="22" y2="-14" stroke="#FF5021" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="18" y2="-8" stroke="#FF5021" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <circle cx="24" cy="-14" r="2" fill="#FF5021"/>
  </g>
</svg>
